# Used when building an image from the client project root
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
