<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — {{BRAND}}</title>
  <link rel="stylesheet" href="css/brand.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="contact">
  <header class="site-header" data-site-header></header>

  <main>
    <div class="page-header">
      <div class="container">
        <h1>Contact us</h1>
        <p>Send a message — no account needed.</p>
      </div>
    </div>

    <section class="section">
      <div class="container contact-grid">
        <div class="contact-info" data-contact-info></div>

        <div class="form-card">
          <form data-contact-form method="POST">
            <input type="hidden" name="_subject" value="">
            <input type="hidden" name="_next" value="">
            <input type="hidden" name="_captcha" value="false">
            <input type="text" name="_honey" style="display:none">

            <div class="form-group">
              <label for="name">Your name</label>
              <input type="text" id="name" name="name" required autocomplete="name">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
              <label for="phone">Phone (optional)</label>
              <input type="tel" id="phone" name="phone" autocomplete="tel">
            </div>
            <div class="form-group">
              <label for="message">How can we help?</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Send message</button>
            <p class="form-note">Powered by FormSubmit — first submission activates email delivery to the client inbox.</p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" data-site-footer></footer>

  <script src="js/site-config.js"></script>
  <script src="js/layout.js"></script>
</body>
</html>
